const VACATION_PERIODS = [
  { start:"2026-07-16", end:"2026-07-29", label:"Ferias 16/07-29/07" },
  { start:"2026-08-20", end:"2026-08-26", label:"Ferias 20/08-26/08" },

};

// в”Җв”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let state = {
  tab: "dashboard",
  searching: null,
  results: {},
  approved: {},
  confirmed: {},
  selWeek: null,
  showManual: false,
  expanded: {},
  manualForm: { week:"", leg:"mon", airline:"Azul", route:"CNFвҶ’SDU", departure:"", code:"", paymentType:"cash", price:"", points:"" },
};

function loadState() {
  try {
    const a = localStorage.getItem("approvedFlights");
    const c = localStorage.getItem("confirmedFlights");
    if (a) state.approved = JSON.parse(a);
    if (c) state.confirmed = JSON.parse(c);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem("approvedFlights", JSON.stringify(state.approved));
    localStorage.setItem("confirmedFlights", JSON.stringify(state.confirmed));
  } catch(e) {}
}

// в”Җв”Җв”Җ DATE HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T12:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}
function fmtDate(str) {
  const d = new Date(str + "T12:00:00");
  return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit" });
}
function fmtMonth(str) {
  const d = new Date(str + "T12:00:00");
  return d.toLocaleDateString("pt-BR", { month:"long", year:"numeric" });
}
function isInVacation(monStr) {
  const mon = new Date(monStr + "T12:00:00");
  const fri = new Date(monStr + "T12:00:00");
  fri.setDate(mon.getDate() + 4);
  for (const v of VACATION_PERIODS) {
    const vs = new Date(v.start + "T00:00:00");
    const ve = new Date(v.end + "T23:59:59");
    if (fri >= vs && mon <= ve) return v.label;
  }
  return null;
}
function getWeekStatus(monStr) {
  const flights = EXISTING_FLIGHTS[monStr];
  if (!flights) return { type:"unknown" };
  const vac = isInVacation(monStr);
  if (vac) return { type:"vacation", label:vac };
  if (HOLIDAY_BLOCKED[monStr]) return { type:"holiday", label:HOLIDAY_BLOCKED[monStr] };
  const monF = flights.mon || state.confirmed[monStr+"-mon"] || null;
  const tueF = flights.tue || state.confirmed[monStr+"-tue"] || null;
  const merged = { mon:monF, tue:tueF };
  if (monF && tueF) return { type:"complete", flights:merged };
  if (monF || tueF) return { type:"partial", flights:merged };
  return { type:"missing", flights:merged };
}
function gLink(origin, dest, date) {
  return "https://www.google.com/travel/flights?q=Voos+" + origin + "+para+" + dest + "+" + date.replace(/-/g,"");
}

// в”Җв”Җв”Җ FLIGHT HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getSegs(f) {
  if (Array.isArray(f.flightInfo) && f.flightInfo[0])
    return f.flightInfo[0].segments || [];
  if (f.flightInfo && f.flightInfo.itineraries && f.flightInfo.itineraries[0])
    return f.flightInfo.itineraries[0].segments || [];
  if (f.slices && f.slices[0]) return f.slices[0].segments || [];
  return [];
}
function getDepTime(f) {
  const segs = getSegs(f);
  if (segs.length > 0 && segs[0].departure)
    return segs[0].departure.time || (segs[0].departure.dateTime || "").slice(11,16) || "";
  return "";
}
function getArrTime(f) {
  const segs = getSegs(f);
  if (segs.length === 0) return "";
  const last = segs[segs.length - 1];
  if (last.arrival) return last.arrival.time || (last.arrival.dateTime || "").slice(11,16) || "";
  return "";
}
function getAirlineName(f) {
  const segs = getSegs(f);
  if (segs.length > 0 && segs[0].marketingCarrier) {
    const code = segs[0].marketingCarrier.code || "";
    return AIRLINE_MAP[code] || code;
  }
  return f.airline || "";
}
function getPricing(f) {
  const opts = [];
  if (f.pricingOptions && f.pricingOptions.length) opts.push(...f.pricingOptions);
  if (f.offers && f.offers.length) opts.push(...f.offers);
  return opts;
}
function extractPrice(offer) {
  const PRICE_KEYS = ["baseFare","adultPrice","companyPrice","fare","amount","totalFare","total","grandTotal","totalAmount"];
  const pr = offer.price;
  const candidates = [];
  if (pr && typeof pr === "object") {
    for (const k of PRICE_KEYS) { const v = Number(pr[k]); if (v > 50) candidates.push(v); }
  } else if (typeof pr === "number" && pr > 50) {
    candidates.push(pr);
  }
  if (!candidates.length) {
    for (const k of ["totalPrice","total","totalAmount","amount","grandTotal","fare"]) {
      const v = Number(offer[k]); if (v > 50) candidates.push(v);
    }
  }
  return candidates.length ? Math.min(...candidates) : 0;
}
function getPrice(f) {
  const all = getPricing(f);
  if (all.length === 0) return f.price || f.total || f.totalPrice || f.amount || 0;
  const prices = all.map(extractPrice).filter(x => x > 0);
  return prices.length > 0 ? Math.min(...prices) : 0;
}
function progLabel(prog) {
  if (/gol|smiles/.test(prog))  return "Smiles";
  if (/azul|tudo/.test(prog))   return "TudoAzul";
  if (/latam/.test(prog))       return "LATAM Pass";
  if (/livelo/.test(prog))      return "Livelo";
  return prog || "Pontos";
}

function getReturnSegs(f) {
  if (Array.isArray(f.flightInfo)) {
    const fi0 = f.flightInfo[0];
    if (fi0 && Array.isArray(fi0.itineraries) && fi0.itineraries[1]) return fi0.itineraries[1].segments || [];
    if (f.flightInfo[1]) return f.flightInfo[1].segments || [];
  }
  if (f.flightInfo && Array.isArray(f.flightInfo.itineraries) && f.flightInfo.itineraries[1])
    return f.flightInfo.itineraries[1].segments || [];
  if (f.slices && f.slices[1]) return f.slices[1].segments || [];
  return [];
}

function segTime(seg, field) {
  if (!seg || !seg[field]) return "";
  return seg[field].time || (seg[field].dateTime || "").slice(11,16) || "";
}

function buildPtsOpts(allMiles) {
  const opts = allMiles.map(m => ({
    airline:        AIRLINE_MAP[m.airline] || m.airline || "",
    departure:      m.departure || "",
    arrival:        m.arrival || "",
    points:         m.pointsRequired || 0,
    program:        progLabel((m.pointsType || m.providerId || "").toLowerCase()),
    taxas:          Math.round(m.taxAmount || 0),
    cashEquivalent: m.cashEquivalent || Math.round((m.pointsRequired || 0) * POINTS_RATE + (m.taxAmount || 0)),
    payment_type:   "points",
  })).filter(o => o.points > 0);
  opts.sort((a, b) => a.cashEquivalent - b.cashEquivalent);
  return opts;
}

// в”Җв”Җв”Җ SEARCH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function searchFlights(monStr, missingLegs) {
  const tue = addDays(monStr, 1);
  const bothMissing = missingLegs.includes("mon") && missingLegs.includes("tue");

  if (bothMissing) {
    // Round-trip: 2 API calls instead of 4, gets combined pricing
    const rtResult = await doRoundTripSearch(monStr, tue);
    const hasFlights = rtResult.results.some(r => r.cashOpts.length > 0);
    if (hasFlights) return rtResult;
    console.log("[RT] No results вҖ” falling back to one_way");
  }
  return doOneWaySearch(monStr, tue, missingLegs);
}

async function doRoundTripSearch(monStr, tue) {
  const apiResults = await Promise.all(["SDU", "GIG"].map(async apt => {
    const body = {
      type: "round_trip",
      slices: [
        { origin: "CNF", destination: apt, departureDate: monStr },
        { origin: apt,   destination: "CNF", departureDate: tue },
      ],
      passengers: [{ type: "adult", count: 1 }],
      cabinClass: "economy",
      include_miles: true,
      miles_programs: ["tudo_azul","azul","smiles","gol","livelo","latam"],
    };
    try {
      const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const byAl = {};
      (data.directFlights||[]).forEach(f => { const a=getAirlineName(f)||"?"; byAl[a]=(byAl[a]||0)+1; });
      console.log(`[RT CNFвҶ”${apt}] direct=${(data.directFlights||[]).length} airlines=${JSON.stringify(byAl)} isRoundTrip=${data.isRoundTrip}`);
      return { data, apt };
    } catch(e) {
      console.log(`[RT CNFвҶ”${apt}] error:`, e.message);
      return { data: { directFlights:[], milesGroups:[] }, apt };
    }
  }));

  // Split each round-trip result into outbound (mon) + return (tue) per-leg options
  const seenSigs = new Set();
  const monCashOpts = [], tueCashOpts = [];

  for (const { data, apt } of apiResults) {
    for (const f of (data.directFlights || [])) {
      const sig = f.signature || f.humanSignature || f.flightSignature || JSON.stringify(f).slice(0, 80);
      if (seenSigs.has(sig)) continue;
      seenSigs.add(sig);

      const fullPrice = Math.round(getPrice(f));
      if (!fullPrice) continue;
      const perLeg = Math.round(fullPrice / 2);
      const airline = getAirlineName(f);

      const outSegs = getSegs(f);
      if (outSegs.length === 1) {
        monCashOpts.push({
          airline, airport: apt, payment_type: "cash",
          departure: segTime(outSegs[0], "departure"),
          arrival:   segTime(outSegs[0], "arrival"),
          price: perLeg, note: "ida+volta", roundTripTotal: fullPrice,
        });
      }

      const retSegs = getReturnSegs(f);
      if (retSegs.length === 1) {
        tueCashOpts.push({
          airline, airport: apt, payment_type: "cash",
          departure: segTime(retSegs[0], "departure"),
          arrival:   segTime(retSegs[0], "arrival"),
          price: perLeg, note: "ida+volta", roundTripTotal: fullPrice,
        });
      }
    }
  }

  monCashOpts.sort((a, b) => a.price - b.price);
  tueCashOpts.sort((a, b) => a.price - b.price);

  const allMiles = apiResults.flatMap(r => r.data.milesGroups || []);
  const ptsOpts = buildPtsOpts(allMiles);
  const total = monCashOpts.length + tueCashOpts.length;
  console.log(`[RT MERGED] mon=${monCashOpts.length} tue=${tueCashOpts.length}`);

  return {
    results: [
      { leg:"mon", date:monStr, cashOpts:monCashOpts, ptsOpts },
      { leg:"tue", date:tue,    cashOpts:tueCashOpts, ptsOpts:[] },
    ],
    isRoundTrip: true,
    summary: total + " combinaГ§Гөes ida+volta В· " + new Date().toLocaleTimeString("pt-BR"),
  };
}

async function doOneWaySearch(monStr, tue, missingLegs) {
  const legResults = await Promise.all(missingLegs.map(async leg => {
    const isMonday = leg === "mon";
    const date = isMonday ? monStr : tue;

    const apiResults = await Promise.all(["SDU","GIG"].map(async apt => {
      const orig = isMonday ? "CNF" : apt;
      const dest = isMonday ? apt   : "CNF";
      try {
        const body = {
          type: "one_way",
          slices: [{ origin:orig, destination:dest, departureDate:date }],
          passengers: [{ type:"adult", count:1 }],
          cabinClass: "economy",
          include_miles: true,
          miles_programs: ["tudo_azul","azul","smiles","gol","livelo","latam"],
        };
        const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const byAl = {};
        (data.directFlights||[]).forEach(f => { const a=getAirlineName(f)||"?"; byAl[a]=(byAl[a]||0)+1; });
        const deps = (data.directFlights||[]).map(f=>`${getAirlineName(f)} ${getDepTime(f)}`).sort();
        console.log(`[OW ${orig}вҶ’${dest}] direct=${(data.directFlights||[]).length} airlines=${JSON.stringify(byAl)} deps=[${deps.join(",")}]`);
        return { data, apt };
      } catch(e) {
        console.log(`[OW ${orig}вҶ’${dest}] error:`, e.message);
        return { data:{ directFlights:[], milesGroups:[] }, apt };
      }
    }));

    const seenSigs = new Set();
    const tagged = [];
    for (const { data, apt } of apiResults) {
      for (const f of (data.directFlights || [])) {
        const sig = f.signature || f.humanSignature || f.flightSignature || JSON.stringify(f).slice(0, 80);
        if (!seenSigs.has(sig)) { seenSigs.add(sig); tagged.push({ f, apt }); }
      }
    }
    console.log(`[OW MERGED ${leg}] direct=${tagged.length}`);

    const cashOpts = tagged.map(({ f, apt }) => ({
      airline:      getAirlineName(f),
      departure:    getDepTime(f),
      arrival:      getArrTime(f),
      price:        Math.round(getPrice(f)),
      airport:      apt,
      payment_type: "cash",
    })).filter(o => o.price > 0);
    cashOpts.sort((a, b) => a.price - b.price);

    return { leg, date, cashOpts, ptsOpts: buildPtsOpts(apiResults.flatMap(r => r.data.milesGroups || [])) };
  }));

  const total = legResults.reduce((s, r) => s + r.cashOpts.length, 0);
  return {
    results: legResults,
    summary: total + " voos diretos encontrados В· " + new Date().toLocaleTimeString("pt-BR"),
  };
}

function addNotif(msg, type) {
  const c = document.getElementById("notifContainer");
  const d = document.createElement("div");
  d.className = "notif";
  d.style.background = type === "success" ? "#1e4a2e" : type === "error" ? "#5a1a1a" : "#1e293b";

// в”Җв”Җв”Җ TAB SWITCHING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  ["dashboard","search","approved","confirmed"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t === tab ? "block" : "none";
  });
  render();
}

// в”Җв”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render() {
  renderPills();
  if (state.tab === "dashboard") renderDashboard();
  if (state.tab === "search")    renderSearch();
  if (state.tab === "approved")  renderApproved();
  if (state.tab === "confirmed") renderConfirmed();
}

function renderPills() {
  const todayStr = new Date().toISOString().split("T")[0];
  const weeks = Object.keys(EXISTING_FLIGHTS).sort().filter(mon => addDays(mon,1) >= todayStr);
  const missing = weeks.filter(mon => { const s = getWeekStatus(mon); return s.type === "missing" || s.type === "partial"; }).length;
  const apprCount = Object.keys(state.approved).length;
  const confCount = Object.keys(state.confirmed).length;
  document.getElementById("headerPills").innerHTML = `
    <div class="pill" style="background:#f9731622;color:#f97316;border-color:#f9731644">${missing} sem voo</div>
    <div class="pill" style="background:#C8B45022;color:#C8B450;border-color:#C8B45044">${apprCount} a comprar</div>
    <div class="pill" style="background:#22c55e22;color:#22c55e;border-color:#22c55e44">${confCount} confirmados</div>
  `;
}

function renderDashboard() {
  const todayStr = new Date().toISOString().split("T")[0];
  const weeks = Object.keys(EXISTING_FLIGHTS).sort().filter(mon => addDays(mon,1) >= todayStr);
  const byMonth = {};
  weeks.forEach(mon => {
    const m = fmtMonth(mon);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(mon);
  });

  const STATUS = {
    complete: { bg:"#0f2a0f", border:"#2d502d", badge:"#4CAF50", icon:"вң…", label:"Voos OK" },
    partial:  { bg:"#2a1f0a", border:"#92400e", badge:"#f97316", icon:"вҡ пёҸ", label:"Parcial" },
    missing:  { bg:"#2a0f0f", border:"#5a1a1a", badge:"#ef4444", icon:"рҹҡЁ", label:"Sem voo" },
    vacation: { bg:"#0d0f1a", border:"#1e3a5a", badge:"#90CAF9", icon:"рҹҸ–", label:"" },
    holiday:  { bg:"#0f0d1a", border:"#4c1d95", badge:"#a78bfa", icon:"рҹҺү", label:"" },
    unknown:  { bg:"#1e3a1e", border:"#2d502d", badge:"#7a9a7a", icon:"?", label:"вҖ”" },
  };

  let html = "";
  for (const [month, mons] of Object.entries(byMonth)) {
    html += `<div class="month-block"><div class="month-label">${month}</div>`;
    for (const mon of mons) {
      const tue = addDays(mon, 1);
      const status = getWeekStatus(mon);
      const cfg = STATUS[status.type] || STATUS.unknown;
      const monConf = state.confirmed[mon+"-mon"];
      const tueConf = state.confirmed[mon+"-tue"];
      const monAppr = state.approved[mon+"-mon"];
      const tueAppr = state.approved[mon+"-tue"];
      const showSearch = status.type === "missing" || status.type === "partial";
      const hasResult = !!state.results[mon];
      const isSrch = state.searching === mon;

      const flightLines = (status.type === "vacation" || status.type === "holiday")
        ? `<div class="flight-line" style="color:${cfg.badge}">${cfg.icon} ${status.label}</div>`
        : `${flightLineHTML("Seg", status.flights&&status.flights.mon, monConf||monAppr, !!monConf, !!monAppr)}
           ${flightLineHTML("Ter", status.flights&&status.flights.tue, tueConf||tueAppr, !!tueConf, !!tueAppr)}`;

      const actionBtn = showSearch ? (hasResult
        ? `<button class="btn btn-blue" onclick="viewResult('${mon}')">рҹ‘Ғ Ver</button>`
        : `<button class="btn ${isSrch?"":"btn-gold"}" style="${isSrch?"background:#374151;color:#9ca3af":""}" onclick="doSearch('${mon}')" ${isSrch?"disabled":""}>
             ${isSrch?"вҸі...":"рҹ”Қ Pesquisar"}
           </button>`) : "";

      html += `
        <div class="week-card" style="background:${cfg.bg};border-color:${cfg.border}">
          <div class="week-dates">
            <div class="label">Seg/Ter</div>
            <div class="date" style="font-weight:bold">${fmtDate(mon)}</div>
            <div class="date">${fmtDate(tue)}</div>
          </div>
          <div class="week-flights">${flightLines}</div>
          <div class="week-actions">
            <div class="badge" style="background:${cfg.badge}22;color:${cfg.badge};border-color:${cfg.badge}44">${cfg.icon} ${cfg.label||status.label||""}</div>
            ${actionBtn}
          </div>
        </div>`;
    }
    html += "</div>";
  }
  document.getElementById("tab-dashboard").innerHTML = html;
}

function flightLineHTML(label, flight, extra, isConf, isAppr) {
  const f = flight || extra;
  if (!f) return `<div class="flight-line"><span style="color:#7a9a7a">${label}:</span> <span style="color:#ef4444">sem voo</span></div>`;
  const icon = isConf ? "вң… " : isAppr ? "рҹӣ’ " : "";
  const color = isConf ? "#A5D6A7" : isAppr ? "#C8B450" : "#D4E8C2";
  return `<div class="flight-line" style="color:${color}"><span style="color:#7a9a7a">${label}:</span> ${icon}${f.airline} ${f.route||""} ${f.time||f.departure||""}${f.code?" ["+f.code+"]":""}</div>`;
}

function renderSearch() {
  const todayStr = new Date().toISOString().split("T")[0];
  const weeks = Object.keys(EXISTING_FLIGHTS).sort().filter(mon => {
    if (addDays(mon,1) < todayStr) return false;
    const s = getWeekStatus(mon);
    return s.type === "missing" || s.type === "partial";
  });
  const opts = weeks.map(mon => `<option value="${mon}" ${state.selWeek===mon?"selected":""}>${fmtDate(mon)}/${fmtDate(addDays(mon,1))}</option>`).join("");

  let content = `
    <div class="search-bar">
      <select class="search-select" onchange="state.selWeek=this.value;render()">
        <option value="">вҖ” selecione a semana вҖ”</option>${opts}
      </select>
      ${state.selWeek ? `<button class="btn btn-gold" onclick="doSearch('${state.selWeek}')" ${state.searching?"disabled":""}>
        ${state.searching ? "вҸі Buscando..." : "рҹ”Қ Pesquisar"}
      </button>` : ""}
    </div>`;

  if (state.searching) {
    content += `<div class="loading"><span class="loading-icon">вңҲ</span>Buscando voos diretos... aguarde atГ© 30s<br><small style="font-size:12px;margin-top:4px;display:block">CNFвҶ’SDU, CNFвҶ’GIG e rotas de volta em paralelo</small></div>`;
  } else if (state.selWeek && state.results[state.selWeek]) {
    content += renderResultPanel(state.selWeek, state.results[state.selWeek]);
  }

  document.getElementById("tab-search").innerHTML = content;
}

// в”Җв”Җв”Җ RESULT PANEL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderResultPanel(monStr, result) {
  if (!result || !result.results || !result.results.length)
    return `<div class="result-card"><div style="color:#93c5fd">${result&&result.summary||"Sem resultados. Tente novamente."}</div></div>`;

  let html = result.summary
    ? `<div style="background:#0f2a0f;border:1px solid #1e3a8a;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#93c5fd">рҹӨ– ${result.summary}</div>`
    : "";

  const TOP = 3;
  for (const leg of result.results) {
    const key     = monStr + "-" + leg.leg;
    const dateStr = leg.leg === "mon" ? monStr : addDays(monStr, 1);
    const legLabel = leg.leg === "mon" ? "Segunda " + fmtDate(dateStr) : "TerГ§a " + fmtDate(dateStr);
    const dirLabel = leg.leg === "mon" ? "CNF вҶ’ Rio" : "Rio вҶ’ CNF";

    const cashKey = key + "-cash";
    const ptsKey  = key + "-pts";
    const cashExp = !!state.expanded[cashKey];
    const ptsExp  = !!state.expanded[ptsKey];

    // Approved banner
    const apprFlight = state.approved[key];
    const approvedBanner = apprFlight ? `
      <div style="background:#14532d;border-radius:6px;padding:8px 12px;font-size:12px;color:#86efac;margin-bottom:12px">
        вң… Aprovado: ${apprFlight.airline} ${apprFlight.departure}
        вҖ” ${apprFlight.payment_type === "points" ? (apprFlight.points||0).toLocaleString("pt-BR")+" pts" : "R$ "+(apprFlight.price||0).toLocaleString("pt-BR")}
      </div>` : "";

    // Cash section
    const visCash = cashExp ? leg.cashOpts : leg.cashOpts.slice(0, TOP);
    const cashMore = leg.cashOpts.length > TOP
      ? `<button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:12px" onclick="toggleExpand('${cashKey}')">
           ${cashExp ? "в–І Ver menos" : "в–ј Ver todos os " + leg.cashOpts.length + " voos"}
         </button>` : "";
    const cashHTML = leg.cashOpts.length === 0
      ? `<div style="color:#6b7280;font-size:13px;padding:6px 0">Nenhum voo direto encontrado.</div>`
      : `<div class="section-label">рҹ’° Pagar em dinheiro</div>
         ${visCash.map((opt, i) => cashCardHTML(opt, i === 0, key, monStr, leg.leg)).join("")}
         ${cashMore}`;

    // Points section
    const visPts = ptsExp ? leg.ptsOpts : leg.ptsOpts.slice(0, TOP);
    const ptsMore = leg.ptsOpts.length > TOP
      ? `<button class="btn btn-ghost" style="width:100%;margin-top:6px;font-size:12px" onclick="toggleExpand('${ptsKey}')">
           ${ptsExp ? "в–І Ver menos" : "в–ј Ver todas as " + leg.ptsOpts.length + " opГ§Гөes"}
         </button>` : "";
    const ptsHTML = leg.ptsOpts.length === 0 ? "" :
      `<div class="section-label" style="margin-top:16px">рҹ”ө Resgatar pontos</div>
       ${visPts.map((opt, i) => ptsCardHTML(opt, i === 0, key, monStr, leg.leg)).join("")}
       ${ptsMore}`;

    html += `
      <div class="result-card">
        <div class="result-header">
          <div class="result-label">${legLabel} В· ${dirLabel}</div>
        </div>
        ${approvedBanner}
        ${cashHTML}
        ${ptsHTML}
      </div>`;
  }
  return html;
}

function cashCardHTML(opt, isBest, key, monStr, leg) {
  const aptBadge = opt.airport === "SDU"
    ? `<span class="option-badge" style="background:#14532d44;color:#86efac;border:1px solid #16653444">вҳ… SDU вҖ” preferido</span>`
    : opt.airport === "GIG"
    ? `<span class="option-badge" style="background:#37415133;color:#9ca3af;border:1px solid #37415155">GIG вҖ” GaleГЈo</span>`
    : "";
  const isRT = opt.note === "ida+volta";
  const topBadge = isBest ? `<div class="option-rec" style="color:#4CAF50">вӯҗ MAIS BARATO</div>` : "";
  const rtNote = isRT ? `<div style="font-size:11px;color:#f59e0b;margin-top:2px">ida+volta В· total R$ ${(opt.roundTripTotal||0).toLocaleString("pt-BR")}</div>` : "";
  const bg = isBest ? "#0f2a0f" : "#1A2E1A";

  const d = JSON.stringify({ airline:opt.airline, departure:opt.departure, arrival:opt.arrival, price:opt.price, airport:opt.airport, payment_type:"cash", note:opt.note||"", roundTripTotal:opt.roundTripTotal||0 });
  const approveBtn = !state.approved[key]
    ? `<button class="btn btn-green" onclick='approveOpt(${JSON.stringify(d)}, "${monStr}", "${leg}")'>вң… Aprovar</button>`
    : "";

  return `
    <div class="option-card" style="background:${bg};border-color:#2d502d">
      <div class="option-info">
        ${topBadge}
        <div class="option-name">
          <span>вңҲ ${opt.airline}</span>
          ${aptBadge}
          <span style="font-size:13px;color:#9ca3af">${opt.departure}${opt.arrival?" вҶ’ "+opt.arrival:""}</span>
        </div>
        ${rtNote}
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div class="option-price">
          <div class="price-main" style="color:#C8B450">R$ ${(opt.price||0).toLocaleString("pt-BR")}</div>
          ${isRT?`<div style="font-size:10px;color:#7a9a7a">por trecho</div>`:""}
        </div>
        ${approveBtn}
      </div>
    </div>`;
}

function ptsCardHTML(opt, isBest, key, monStr, leg) {
  const topBadge = isBest ? `<div class="option-rec" style="color:#90CAF9">рҹ”ө MAIS BARATO EM PONTOS</div>` : "";
  const bg = isBest ? "#0f1a2a" : "#1A2E1A";

  const d = JSON.stringify({ airline:opt.airline, departure:opt.departure, arrival:opt.arrival, points:opt.points, taxas:opt.taxas, cashEquivalent:opt.cashEquivalent, program:opt.program, payment_type:"points" });
  const approveBtn = !state.approved[key]
    ? `<button class="btn btn-blue" onclick='approveOpt(${JSON.stringify(d)}, "${monStr}", "${leg}")'>вң… Aprovar</button>`
    : "";

  return `
    <div class="option-card" style="background:${bg};border-color:#1e3a5a">
      <div class="option-info">
        ${topBadge}
        <div class="option-name">
          <span>рҹ”ө ${opt.airline||"?"}</span>
          <span class="option-badge" style="background:#1e3a8a33;color:#90CAF9">${opt.program}</span>
          <span style="font-size:13px;color:#9ca3af">${opt.departure}${opt.arrival?" вҶ’ "+opt.arrival:""}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div class="option-price">
          <div class="price-main" style="color:#93c5fd">${(opt.points||0).toLocaleString("pt-BR")} pts</div>
          <div class="price-sub">вүҲ R$ ${opt.cashEquivalent}${opt.taxas?" (R$"+opt.taxas+" taxas)":""}</div>
        </div>
        ${approveBtn}
      </div>
    </div>`;
}

// в”Җв”Җв”Җ APPROVED / CONFIRMED TABS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderApproved() {
  const keys = Object.keys(state.approved).sort();
  if (keys.length === 0) {
    document.getElementById("tab-approved").innerHTML = `<div class="empty">Nenhum voo aguardando compra.</div>`;
    return;
  }
  let html = keys.map(key => flightCardHTML(key, state.approved[key], "approved")).join("");
  const totalCash = Object.values(state.approved).filter(f => f.payment_type !== "points").reduce((s, f) => s + (f.price||0), 0);
  const totalPts = Object.values(state.approved).filter(f => f.payment_type === "points").reduce((s, f) => s + (f.points||0), 0);
  html += `<div class="summary-bar">
    <span>Dinheiro: <strong style="color:#C8B450">R$ ${totalCash.toLocaleString("pt-BR")}</strong></span>
    ${totalPts > 0 ? `<span>Pontos: <strong style="color:#93c5fd">${totalPts.toLocaleString("pt-BR")} pts</strong></span>` : ""}
  </div>`;
  document.getElementById("tab-approved").innerHTML = html;
}

function renderConfirmed() {
  const keys = Object.keys(state.confirmed).sort();
  const manualBtn = `<div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <button class="btn btn-blue" onclick="toggleManual()">вңҸпёҸ Registrar compra manualmente</button>
  </div>`;

  let manualFormHTML = "";
  if (state.showManual) {
    const mf = state.manualForm;
    manualFormHTML = `
      <div class="manual-form">
        <div style="font-size:13px;color:#93c5fd;font-weight:bold;margin-bottom:14px">вңҸпёҸ Registrar compra</div>
        <div class="form-grid">
          <div class="form-field"><label>Semana (Segunda)</label><input type="date" value="${mf.week}" onchange="updateManual('week',this.value)"></div>
          <div class="form-field"><label>Trecho</label><select onchange="updateManual('leg',this.value)"><option value="mon" ${mf.leg==="mon"?"selected":""}>Segunda (ida)</option><option value="tue" ${mf.leg==="tue"?"selected":""}>TerГ§a (volta)</option></select></div>
          <div class="form-field"><label>Companhia</label><select onchange="updateManual('airline',this.value)"><option>Azul</option><option>Gol</option><option>LATAM</option></select></div>
          <div class="form-field"><label>Rota</label><select onchange="updateManual('route',this.value)"><option>CNFвҶ’SDU</option><option>SDUвҶ’CNF</option><option>CNFвҶ’GIG</option><option>GIGвҶ’CNF</option></select></div>
          <div class="form-field"><label>Horario</label><input type="text" value="${mf.departure}" placeholder="08:15" onchange="updateManual('departure',this.value)"></div>
          <div class="form-field"><label>Codigo reserva</label><input type="text" value="${mf.code}" onchange="updateManual('code',this.value)"></div>
          <div class="form-field"><label>Pagamento</label><select onchange="updateManual('paymentType',this.value)"><option value="cash" ${mf.paymentType==="cash"?"selected":""}>Dinheiro</option><option value="points" ${mf.paymentType==="points"?"selected":""}>Pontos</option></select></div>
          <div class="form-field"><label>${mf.paymentType==="points"?"Pontos":"Valor R$"}</label><input type="number" value="${mf.paymentType==="points"?mf.points:mf.price}" onchange="updateManual(state.manualForm.paymentType==='points'?'points':'price',this.value)"></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-green" onclick="submitManual()">вң… Confirmar</button>
          <button class="btn btn-ghost" onclick="toggleManual()">Cancelar</button>
        </div>
      </div>`;
  }

  if (keys.length === 0 && !state.showManual) {
    document.getElementById("tab-confirmed").innerHTML = manualBtn + `<div class="empty">Nenhuma compra confirmada ainda.</div>`;
    return;
  }
  document.getElementById("tab-confirmed").innerHTML = manualBtn + manualFormHTML + keys.map(key => flightCardHTML(key, state.confirmed[key], "confirmed")).join("");
}

function flightCardHTML(key, flight, mode) {
  const isPoints = flight.payment_type === "points";
  const isConf = mode === "confirmed";
  const borderColor = isConf ? "#2d502d" : isPoints ? "#1e3a5a" : "#92400e";
  const badgeColor = isConf ? "#4CAF50" : isPoints ? "#90CAF9" : "#C8B450";
  const badgeText = isConf
    ? ("вң… CONFIRMADO" + (flight.code ? " В· " + flight.code : ""))
    : (isPoints ? "рҹ”ө RESGATAR PONTOS" : "рҹӣ’ COMPRAR");
  const dateLbl = flight.leg === "mon" ? "Segunda " + fmtDate(flight.week) : "TerГ§a " + fmtDate(addDays(flight.week, 1));
  const priceHTML = isPoints
    ? `<div style="font-size:16px;font-weight:bold;color:#93c5fd">${(flight.points||0).toLocaleString("pt-BR")} pts</div>
       <div style="font-size:11px;color:#6b7280">вүҲ R$${flight.cashEquivalent||0}${flight.taxas?" (R$"+flight.taxas+" taxas)":""}</div>`
    : `<div style="font-size:16px;font-weight:bold;color:#C8B450">R$ ${(flight.price||0).toLocaleString("pt-BR")}</div>`;
  const linkHTML = flight.link && !isConf ? `<a href="${flight.link}" target="_blank" style="font-size:11px">вҶ’ ${isPoints?"Resgatar":"Comprar"}</a>` : "";
  const confirmBtn = mode === "approved" ? `<button class="btn btn-green" onclick="confirmFlight('${key}')">вң… Confirmar</button>` : "";
  const removeBtn = `<button class="btn btn-ghost" onclick="removeFlight('${key}','${mode}')">вң•</button>`;

  return `
    <div class="flight-card" style="border-color:${borderColor}">
      <div class="flight-card-info">
        <div class="flight-card-badge" style="color:${badgeColor}">${badgeText}</div>
        <div class="flight-card-name">${flight.airline} В· ${flight.route||""} В· ${flight.departure}</div>
        <div class="flight-card-date">${dateLbl}</div>
      </div>
      <div class="flight-card-actions">
        <div class="flight-card-price">${priceHTML}${linkHTML}</div>
        ${confirmBtn}${removeBtn}
      </div>
    </div>`;
}

// в”Җв”Җв”Җ ACTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function doSearch(monStr) {
  const status = getWeekStatus(monStr);
  const missing = [];
  if (!status.flights || !status.flights.mon) missing.push("mon");
  if (!status.flights || !status.flights.tue) missing.push("tue");
  if (missing.length === 0) return;
  state.searching = monStr;
  state.selWeek = monStr;
  state.tab = "search";
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === 1));
  document.getElementById("tab-search").style.display = "block";
  document.getElementById("tab-dashboard").style.display = "none";
  render();
  try {
    const res = await searchFlights(monStr, missing);
    state.results[monStr] = res;
    addNotif("Busca concluida! " + (res.summary||""), "success");
  } catch(e) {
    addNotif("Erro: " + (e.message||"Tente novamente"), "error");
  } finally {
    state.searching = null;
    render();
  }
}

function toggleExpand(key) {
  state.expanded[key] = !state.expanded[key];
  render();
}

function viewResult(monStr) {
  state.selWeek = monStr;
  state.tab = "search";
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === 1));
  ["dashboard","approved","confirmed"].forEach(t => document.getElementById("tab-"+t).style.display = "none");
  document.getElementById("tab-search").style.display = "block";
  render();
}

function approveOpt(optStr, monStr, leg) {
  const opt = JSON.parse(optStr);
  const date = leg === "mon" ? monStr : addDays(monStr, 1);
  const apt = opt.airport || "SDU";
  const orig = leg === "mon" ? "CNF" : apt;
  const dest = leg === "mon" ? apt   : "CNF";
  const link = gLink(orig, dest, date);
  state.approved[monStr+"-"+leg] = Object.assign({}, opt, { link, leg, week: monStr, route: orig+"вҶ’"+dest });
  saveState();
  addNotif("Voo " + opt.airline + " " + opt.departure + " aprovado!", "success");
  render();
}

function confirmFlight(key) {
  const code = prompt("Codigo de reserva (opcional):");
  const flight = state.approved[key];
  state.confirmed[key] = Object.assign({}, flight, { code: code||"", status:"confirmed" });
  delete state.approved[key];
  saveState();
  addNotif("Compra confirmada!", "success");
  render();
}

function removeFlight(key, mode) {
  if (mode === "approved") delete state.approved[key];
  else delete state.confirmed[key];
  saveState();
  render();
}

function toggleManual() {
  state.showManual = !state.showManual;
  render();
}

function updateManual(field, value) {
  state.manualForm[field] = value;
}

function submitManual() {
  const f = state.manualForm;
  if (!f.week || !f.departure) { addNotif("Preencha semana e horario", "error"); return; }
  const key = f.week + "-" + f.leg;
  state.confirmed[key] = {
    airline: f.airline, route: f.route, departure: f.departure, code: f.code,
    payment_type: f.paymentType,
    price:  f.paymentType === "cash"   ? Number(f.price)  : null,
    points: f.paymentType === "points" ? Number(f.points) : null,
    leg: f.leg, week: f.week, status: "confirmed_manual",
  };
  saveState();
  addNotif("Compra registrada!", "success");
  state.showManual = false;
  state.manualForm = { week:"", leg:"mon", airline:"Azul", route:"CNFвҶ’SDU", departure:"", code:"", paymentType:"cash", price:"", points:"" };
  render();
}

// в”Җв”Җв”Җ INIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
loadState();
render();
</script>
